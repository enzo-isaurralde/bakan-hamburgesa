<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakan · Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --accent: #e8392a;
            --accent-hover: #ff4433;
            --text: #f0f0f0;
            --text-muted: #666;
            --input-bg: #1c1c1c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fondo con textura */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,57,42,0.12) 0%, transparent 70%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 0.08em;
            color: var(--text);
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            margin-bottom: 4px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 1.75rem;
            letter-spacing: 0.02em;
        }

        .field {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,57,42,0.12);
        }

        input::placeholder {
            color: #3a3a3a;
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            display: none;
            background: rgba(232,57,42,0.1);
            border: 1px solid rgba(232,57,42,0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: #ff6b5b;
            margin-bottom: 1rem;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .error-msg.visible {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <span class="logo-dot"></span>
        BAKAN
    </div>
    <p class="subtitle">Panel de acceso interno</p>

    <div class="card">
        <p class="card-title">Ingresá tus credenciales</p>

        <div id="errorMsg" class="error-msg">
            Usuario o contraseña incorrectos.
        </div>

        <div class="field">
            <label for="username">Usuario</label>
            <input type="text" id="username" placeholder="admin" autocomplete="username" />
        </div>

        <div class="field">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button class="btn" id="loginBtn" onclick="handleLogin()">INGRESAR</button>
    </div>

    <a href="/index.html" class="back-link">← Volver al sitio</a>
</div>

<script>
    const API_URL = 'http://localhost:8080';

    // Login al presionar Enter
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        if (!username || !password) {
            mostrarError('Completá todos los campos.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'VERIFICANDO...';
        errorMsg.classList.remove('visible');

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
                mostrarError('Usuario o contraseña incorrectos.');
                return;
            }

            const token = await response.text();
            localStorage.setItem('token', token);

            // Decodificar el token para saber el rol
            const payload = JSON.parse(atob(token.split('.')[1]));
            const rol = payload.rol;

            if (rol === 'ADMIN') {
                window.location.href = '/admin.html';
            } else if (rol === 'COCINA') {
                window.location.href = '/cocina.html';
            } else {
                mostrarError('Rol no reconocido.');
            }

        } catch (error) {
            mostrarError('Error de conexión. Intentá de nuevo.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'INGRESAR';
        }
    }

    function mostrarError(msg) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
    }
</script>

</body>
</html>
