<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKAN BURGER - Armá tu pedido</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="header">
    <div class="logo">🔥 BAKAN</div>
    <div class="header-info">
        <div class="estado">Abierto ahora</div>
        <div class="horario">Cierra 23:30 hs</div>
    </div>
</header>

<section class="hero">
    <h1>Hamburguesas que enamoran</h1>
    <p>Armá tu pedido en segundos. Sin registrarte. Sin complicaciones. Directo al WhatsApp del local.</p>
</section>

<div class="categorias">
    <button class="cat-btn active" onclick="filtrarCategoria('HAMBURGUESAS')">🍔 Hamburguesas</button>
    <button class="cat-btn" onclick="filtrarCategoria('PAPAS')">🍟 Papas</button>
    <button class="cat-btn" onclick="filtrarCategoria('BEBIDAS')">🥤 Bebidas</button>
</div>

<div class="container">
    <h2 class="section-title">
        <span class="emoji-title">🔥</span>
        Nuestro Menú
    </h2>
    <div class="productos-grid" id="productos-grid">
        <div class="loading">Cargando menú...</div>
    </div>
</div>

<div class="carrito-flotante" id="carrito-flotante" onclick="abrirModal()">
    <span class="carrito-icono">🛒</span>
    <div class="carrito-info">
        <span class="carrito-total" id="carrito-total">$0</span>
        <span class="carrito-items" id="carrito-items">0 items</span>
    </div>
    <span>→</span>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
    <div class="modal-carrito" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 class="modal-titulo">🛒 Tu Pedido</h3>
            <button class="btn-cerrar" onclick="cerrarModal()">×</button>
        </div>

        <div id="lista-carrito">
            <p style="text-align: center; color: var(--gris); padding: 40px;">Tu carrito está vacío</p>
        </div>

        <div class="resumen-pedido" id="resumen-pedido" style="display: none;">
            <div class="linea-resumen">
                <span>Subtotal</span>
                <span id="resumen-subtotal">$0</span>
            </div>
            <div class="linea-total">
                <span>Total</span>
                <span id="resumen-total">$0</span>
            </div>
        </div>

        <div id="formulario-pedido" style="display: none;">
            <input type="text" id="cliente-nombre" class="notas-pedido" placeholder="Tu nombre" style="margin-bottom: 10px;">
            <textarea class="notas-pedido" rows="2" placeholder="Notas adicionales (ej: sin cebolla, salsa aparte...)"></textarea>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
                <span>📱</span>
                Enviar pedido por WhatsApp
            </button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
